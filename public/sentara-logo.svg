<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" height="50">
  <!-- Sentara S-mark: two arced strokes forming an S, in brand gold -->
  <g transform="translate(4, 4)">
    <!-- Top arc (upper C of the S) -->
    <path d="M 26,4 C 38,4 48,10 48,20 C 48,28 40,33 30,33 C 22,33 16,30 16,30"
          fill="none" stroke="#F5A800" stroke-width="8.5" stroke-linecap="round"/>
    <!-- Bottom arc (lower C of the S) -->
    <path d="M 18,23 C 18,23 10,27 10,35 C 10,44 20,51 32,51 C 42,51 50,45 50,45"
          fill="none" stroke="#F5A800" stroke-width="8.5" stroke-linecap="round"/>
  </g>
  <!-- Sentara wordmark -->
  <text x="68" y="40" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Sentara</text>
  <text x="212" y="24" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">®</text>
</svg>
