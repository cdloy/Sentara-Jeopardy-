<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentara Jeopardy — Buzzer</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #F5A800;
      --gold-light: #FFD166;
      --navy: #0A0A2E;
      --board-blue: #0B0B8B;
      --white: #ffffff;
      --green: #00C853;
      --red: #D50000;
      --team-color: #F5A800;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ── */
    .top-bar {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border-bottom: 2px solid var(--team-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-bar img {
      height: 38px;
      object-fit: contain;
    }

    .logo-text {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    .game-label {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* ── Main Content ── */
    .main {
      flex: 1;
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px 20px;
    }

    /* ── Team Name ── */
    .team-name {
      font-family: 'Oswald', sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: var(--team-color);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.1;
      transition: color 0.3s;
    }

    /* ── Score ── */
    .score-wrap {
      text-align: center;
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 4px;
    }

    .score-display {
      font-family: 'Oswald', sans-serif;
      font-size: 52px;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
    }

    /* ── Status Banner ── */
    .status-banner {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 20px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .status-banner.open {
      border-color: var(--green);
      background: rgba(0, 200, 83, 0.1);
      color: var(--green);
    }

    .status-banner.buzzed-self {
      border-color: var(--gold);
      background: rgba(245, 168, 0, 0.12);
      color: var(--gold);
    }

    .status-banner.buzzed-other {
      border-color: var(--red);
      background: rgba(213, 0, 0, 0.1);
      color: #ff6b6b;
    }

    .status-banner.correct {
      border-color: var(--green);
      background: rgba(0, 200, 83, 0.15);
      color: var(--green);
    }

    .status-banner.wrong {
      border-color: var(--red);
      background: rgba(213, 0, 0, 0.12);
      color: #ff6b6b;
    }

    /* ── Buzz Button ── */
    .buzz-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buzz-ring {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 4px solid rgba(245,168,0,0.25);
      animation: none;
      transition: all 0.3s;
    }

    .buzz-ring.active {
      animation: ringPulse 1.2s ease-in-out infinite;
      border-color: rgba(245,168,0,0.6);
    }

    @keyframes ringPulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 0.3; }
      100% { transform: scale(1); opacity: 0.8; }
    }

    .buzz-btn {
      width: 230px;
      height: 230px;
      border-radius: 50%;
      border: 5px solid var(--team-color);
      background: radial-gradient(circle at 35% 35%, #1e1e8a, #0B0B8B);
      color: var(--team-color);
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      position: relative;
      z-index: 2;
      transition: all 0.15s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 0 rgba(245,168,0,0);
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .buzz-btn:hover:not(:disabled) {
      transform: scale(1.04);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px rgba(245,168,0,0.3);
    }

    .buzz-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .buzz-btn.open {
      background: radial-gradient(circle at 35% 35%, #0B8B2A, #057520);
      border-color: var(--green);
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 30px rgba(0,200,83,0.4);
      animation: btnPulse 1.2s ease-in-out infinite;
    }

    @keyframes btnPulse {
      0% { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,200,83,0.3); }
      50% { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 50px rgba(0,200,83,0.6); }
      100% { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(0,200,83,0.3); }
    }

    .buzz-btn.buzzed-self {
      background: radial-gradient(circle at 35% 35%, #8B6A00, #6b5000);
      border-color: var(--gold);
      color: var(--gold-light);
      animation: none;
    }

    .buzz-btn.locked {
      background: radial-gradient(circle at 35% 35%, #3a1a1a, #2a0a0a);
      border-color: rgba(213,0,0,0.4);
      color: rgba(255,255,255,0.25);
      cursor: not-allowed;
      animation: none;
    }

    .buzz-btn:disabled { cursor: not-allowed; }

    /* ── Connection ── */
    .conn-bar {
      width: 100%;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .conn-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      margin-right: 5px;
      vertical-align: middle;
    }

    .conn-dot.on { background: var(--green); }
  </style>
</head>
<body>

<div class="top-bar">
  <img src="sentara-logo.svg" alt="Sentara" onerror="this.style.display='none'; document.getElementById('logo-fb').style.display='block';">
  <span class="logo-text" id="logo-fb" style="display:none;">SENTARA</span>
  <span class="game-label">Speech Therapy Jeopardy</span>
</div>

<div class="main">
  <div class="team-name" id="teamNameDisplay">Loading…</div>

  <div class="score-wrap">
    <div class="score-label">Score</div>
    <div class="score-display" id="scoreDisplay">$0</div>
  </div>

  <div class="status-banner" id="statusBanner">Waiting for the host to open a question…</div>

  <div class="buzz-wrap">
    <div class="buzz-ring" id="buzzRing"></div>
    <button class="buzz-btn" id="buzzBtn" disabled onclick="doBuzz()">BUZZ</button>
  </div>
</div>

<div class="conn-bar">
  <span class="conn-dot" id="connDot"></span>
  <span id="connText">Connecting…</span>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const team = params.get('team') === '2' ? 'team2' : 'team1';
  const teamKey = team;

  const socket = io();

  let myTeamName = team === 'team1' ? 'Team 1' : 'Team 2';
  let buzzerOpen = false;
  let hasBuzzed = false;

  // ── Elements ──
  const nameDisplay = document.getElementById('teamNameDisplay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const statusBanner = document.getElementById('statusBanner');
  const buzzBtn = document.getElementById('buzzBtn');
  const buzzRing = document.getElementById('buzzRing');

  // ── Connection ──
  socket.on('connect', () => {
    document.getElementById('connDot').classList.add('on');
    document.getElementById('connText').textContent = 'Connected';
  });

  socket.on('disconnect', () => {
    document.getElementById('connDot').classList.remove('on');
    document.getElementById('connText').textContent = 'Disconnected — refresh to reconnect';
    setStatus('waiting');
  });

  // ── State Sync ──
  socket.on('fullState', ({ gameState }) => {
    updateName(gameState.teamNames);
    updateScore(gameState.scores);
    if (gameState.phase === 'question' && gameState.buzzerOpen) {
      setStatus('open');
    } else if (gameState.phase === 'question' && gameState.buzzedTeam) {
      if (gameState.buzzedTeam === teamKey) {
        setStatus('buzzed-self');
      } else {
        setStatus('buzzed-other', gameState.teamNames[gameState.buzzedTeam]);
      }
    } else {
      setStatus('waiting');
    }
  });

  socket.on('teamNamesUpdate', (names) => updateName(names));
  socket.on('scoreUpdate', (scores) => updateScore(scores));

  socket.on('questionOpened', () => {
    hasBuzzed = false;
    setStatus('open');
  });

  socket.on('buzzerEnabled', () => {
    hasBuzzed = false;
    setStatus('open');
  });

  socket.on('buzzed', ({ team: whoTeam, teamName }) => {
    if (whoTeam === teamKey) {
      setStatus('buzzed-self');
    } else {
      setStatus('buzzed-other', teamName);
    }
  });

  socket.on('questionClosed', () => {
    hasBuzzed = false;
    setStatus('waiting');
  });

  // ── Helpers ──
  function updateName(names) {
    myTeamName = names[teamKey];
    nameDisplay.textContent = myTeamName;
  }

  function updateScore(scores) {
    scoreDisplay.textContent = `$${scores[teamKey].toLocaleString()}`;
  }

  function setStatus(state, otherTeamName) {
    buzzerOpen = false;
    buzzBtn.disabled = true;
    buzzBtn.className = 'buzz-btn';
    buzzRing.classList.remove('active');
    statusBanner.className = 'status-banner';

    if (state === 'waiting') {
      statusBanner.textContent = 'Waiting for the host to open a question…';
    } else if (state === 'open') {
      buzzerOpen = true;
      buzzBtn.disabled = false;
      buzzBtn.classList.add('open');
      buzzRing.classList.add('active');
      statusBanner.classList.add('open');
      statusBanner.textContent = '🔔 Buzzer is OPEN — press to answer!';
    } else if (state === 'buzzed-self') {
      buzzBtn.classList.add('buzzed-self');
      statusBanner.classList.add('buzzed-self');
      statusBanner.textContent = '🎯 You buzzed in! Give your answer.';
    } else if (state === 'buzzed-other') {
      buzzBtn.classList.add('locked');
      statusBanner.classList.add('buzzed-other');
      statusBanner.textContent = `⚡ ${otherTeamName || 'Other team'} buzzed first!`;
    }
  }

  // ── Buzz ──
  function doBuzz() {
    if (!buzzerOpen || hasBuzzed) return;
    hasBuzzed = true;
    socket.emit('buzz', { team: teamKey });
  }

  // Spacebar / Enter as backup buzz key
  document.addEventListener('keydown', (e) => {
    if ((e.code === 'Space' || e.code === 'Enter') && buzzerOpen && !hasBuzzed) {
      e.preventDefault();
      doBuzz();
    }
  });

  // Touch support — fire immediately on touchstart
  buzzBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    doBuzz();
  }, { passive: false });
</script>
</body>
</html>
